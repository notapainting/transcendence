version: '3.9'

services:
  django:
    container_name: ${APP_NAME}
    build:
      context: apps/auth_service/django/
    image: ${APP_NAME}_image:${VERSION}
    environment:
      APP_NAME: ${APP_NAME}
      HOST: ${APP_HOST}
      PORT: ${APP_PORT}
    volumes:
    - source_code:/app
    ports:
    - "${APP_PORT}:${APP_PORT}"
    networks: 
      - app_network
    restart: unless-stopped
    depends_on:
      - nginx
    entrypoint: ["python", "/app/manage.py", "runserver", "0.0.0.0:8000"]


  nginx:
    container_name: nginx-selfsigned
    build:
      context: server
    image: nginx-proxy
    ports:
     - "8443:443"
     - "8080:80"
    networks: 
      - app_network
    volumes:
      - ./server/certs/:/certs
      - ./front:/var/www/static
      - ./logs:/logs
    restart: unless-stopped

volumes:
  source_code:
    name: ${APP_VOLUME} 
    driver: local
    driver_opts:
      type: none
      device: apps/auth_service/django/src/
      o: bind


networks:
  app_network:
    name: dev_network
    driver: bridge
